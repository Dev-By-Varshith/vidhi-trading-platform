name: Deploy to AWS

on:
  push:
    branches: [main, master]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build and push backend image
        run: |
          echo "" > .dockerignore
          ls -la
          ls -la backend/
          ls -la game-master/
          aws ecr get-login-password | docker login --username AWS --password-stdin 042470866347.dkr.ecr.us-east-1.amazonaws.com
          docker build -f backend/Dockerfile -t vidhi-engine-backend .
          docker tag vidhi-engine-backend 042470866347.dkr.ecr.us-east-1.amazonaws.com/vidhi-engine-backend:latest
          docker push 042470866347.dkr.ecr.us-east-1.amazonaws.com/vidhi-engine-backend:latest

      - name: Update ECS Fargate Service
        run: |
          aws ecs update-service \
            --cluster vidhi-cluster \
            --service vidhi-backend \
            --force-new-deployment

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          
      - name: Build React App
        run: |
          cd vidhi_context
          npm ci
          # VITE_API_URL      = local/relative API (proxied or ALB for same-origin)
          # VITE_CLOUD_API_URL = AWS ALB REST endpoint for cloud simulation runs
          # VITE_CLOUD_WS_URL  = AWS ALB WebSocket endpoint for cloud telemetry
          VITE_API_URL=http://${{ secrets.ALB_URL }} \
          VITE_CLOUD_API_URL=http://${{ secrets.ALB_URL }} \
          VITE_CLOUD_WS_URL=ws://${{ secrets.ALB_URL }}/ws \
          npm run build
          
      - name: Sync to S3
        run: |
          aws s3 sync vidhi_context/dist/ s3://${{ secrets.FRONTEND_BUCKET }} --delete
          
      - name: Invalidate CloudFront cache (if configured)
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
            aws cloudfront create-invalidation \
              --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
              --paths "/*"
          fi
