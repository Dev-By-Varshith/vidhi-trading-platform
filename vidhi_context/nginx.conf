server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── COOP/COEP headers required for SharedArrayBuffer (Arrow WASM) ─────────
    add_header Cross-Origin-Opener-Policy   "same-origin"    always;
    add_header Cross-Origin-Embedder-Policy "require-corp"   always;

    # ── SPA routing — all unknown paths → index.html ──────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── REST API proxy to Go backend ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;  # long-running GM executions
        proxy_send_timeout 300s;
    }

    # ── WebSocket proxy for live telemetry ────────────────────────────────────
    location /ws/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;  # keep WS open for full sim duration
    }

    # ── Static dataset served with proper MIME type ───────────────────────────
    location /data/ticks/ {
        types { }
        default_type application/octet-stream;
        add_header Cache-Control "public, max-age=86400";
    }

    # Gzip for text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
